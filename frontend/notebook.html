<!doctype html>
<html class="scroll-smooth" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Notebook Detail | NotebookLM Gallery</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link href="/css/style.css" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "text-main": "#1E293B",
              "on-primary-fixed": "#00174b",
              "on-secondary-container": "#5c647a",
              "inverse-on-surface": "#eff1f3",
              "border-subtle": "#E2E8F0",
              "on-tertiary-fixed": "#390c00",
              "primary-fixed": "#dbe1ff",
              "surface-container-highest": "#e0e3e5",
              "secondary-fixed": "#dae2fd",
              outline: "#737687",
              "inverse-surface": "#2d3133",
              "surface-container": "#eceef0",
              "secondary-fixed-dim": "#bec6e0",
              "surface-tint": "#0052dc",
              "surface-dim": "#d8dadc",
              primary: "#004bca",
              secondary: "#565e74",
              "on-secondary-fixed": "#131b2e",
              "primary-fixed-dim": "#b4c5ff",
              "primary-container": "#0061ff",
              "on-primary-fixed-variant": "#003ea8",
              "tertiary-container": "#c73f00",
              "on-background": "#191c1e",
              "outline-variant": "#c2c6d9",
              "on-error-container": "#93000a",
              "surface-container-high": "#e6e8ea",
              surface: "#f7f9fb",
              background: "#f7f9fb",
              "on-primary": "#ffffff",
              "on-tertiary-container": "#ffefeb",
              "success-green": "#10B981",
              "on-secondary": "#ffffff",
              "on-primary-container": "#f1f2ff",
              "on-surface-variant": "#424656",
              "text-muted": "#64748B",
              tertiary: "#9d3000",
              "surface-container-low": "#f2f4f6",
              "on-secondary-fixed-variant": "#3f465c",
              "on-tertiary-fixed-variant": "#832700",
              error: "#ba1a1a",
              "tertiary-fixed": "#ffdbd0",
              "surface-variant": "#e0e3e5",
              "on-error": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "inverse-primary": "#b4c5ff",
              "error-container": "#ffdad6",
              "secondary-container": "#dae2fd",
              "surface-bright": "#f7f9fb",
              "surface-white": "#FFFFFF",
              "on-surface": "#191c1e",
              "on-tertiary": "#ffffff",
              "tertiary-fixed-dim": "#ffb59d",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              gutter: "1.5rem",
              "stack-sm": "0.5rem",
              "margin-desktop": "2rem",
              "margin-mobile": "1rem",
              "container-max": "1200px",
              "stack-lg": "2rem",
              "stack-md": "1rem",
            },
            fontFamily: {
              "body-sm": ["Inter"],
              "label-md": ["Inter"],
              "body-lg": ["Inter"],
              "display-lg": ["Plus Jakarta Sans"],
              "headline-lg": ["Plus Jakarta Sans"],
              "label-sm": ["Inter"],
              "headline-sm": ["Plus Jakarta Sans"],
              "headline-md": ["Plus Jakarta Sans"],
              "body-md": ["Inter"],
            },
            fontSize: {
              "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
              "label-md": [
                "14px",
                {
                  lineHeight: "1",
                  letterSpacing: "0.01em",
                  fontWeight: "600",
                },
              ],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "display-lg": [
                "48px",
                {
                  lineHeight: "1.1",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.01em",
                  fontWeight: "700",
                },
              ],
              "label-sm": ["12px", { lineHeight: "1", fontWeight: "500" }],
              "headline-sm": ["18px", { lineHeight: "1.4", fontWeight: "600" }],
              "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        vertical-align: middle;
      }
      .heart-icon.liked {
        font-variation-settings:
          "FILL" 1,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        color: #ef4444;
      }
      .glass-header {
        background: rgba(247, 249, 251, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .skeleton {
        background: linear-gradient(
          90deg,
          #eceef0 25%,
          #f2f4f6 50%,
          #eceef0 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
      @media (max-width: 640px) {
        .text-display-lg {
          font-size: 28px !important;
        }
      }
    </style>
  </head>
  <body
    class="bg-background text-text-main font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed"
  >
    <!-- Navbar -->
    <header
      class="fixed top-0 w-full z-50 glass-header border-b border-border-subtle shadow-sm"
    >
      <div
        class="flex justify-between items-center px-gutter py-4 max-w-container-max mx-auto"
      >
        <div class="flex items-center gap-8">
          <a
            class="font-headline-md text-headline-md font-bold text-text-main"
            href="/"
            >NotebookLM Gallery</a
          >
          <nav class="hidden md:flex gap-6">
            <a
              class="font-body-md text-body-md text-text-muted hover:text-primary transition-colors duration-200"
              href="/"
              >Discover</a
            >
            <a
              class="font-body-md text-body-md text-text-muted hover:text-primary transition-colors duration-200"
              href="/"
              >Trending</a
            >
            <a
              class="font-body-md text-body-md text-text-muted hover:text-primary transition-colors duration-200"
              href="/"
              >Recent</a
            >
          </nav>
        </div>
        <div class="flex items-center gap-4">
          <a
            href="/submit"
            class="hidden md:flex items-center px-6 py-2.5 bg-primary-container text-on-primary-container font-label-md text-label-md rounded-lg active:opacity-80 transition-opacity hover:shadow-md"
          >
            Submit Notebook
          </a>
          <button class="md:hidden text-text-main">
            <span class="material-symbols-outlined">menu</span>
          </button>
        </div>
      </div>
    </header>

    <main
      class="pt-24 pb-stack-lg max-w-container-max mx-auto px-gutter min-h-screen"
    >
      <!-- Loading State -->
      <div id="loadingState" class="space-y-8 py-8">
        <div class="skeleton h-5 w-40 rounded-lg"></div>
        <div class="skeleton h-64 w-full rounded-xl"></div>
        <div class="skeleton h-8 w-32 rounded-lg"></div>
        <div class="skeleton h-12 w-3/4 rounded-lg"></div>
        <div class="skeleton h-24 w-full rounded-lg"></div>
      </div>

      <!-- Not Found State -->
      <div
        id="notFoundState"
        class="hidden text-center py-24 flex flex-col items-center gap-6"
      >
        <span class="material-symbols-outlined text-7xl text-text-muted/20"
          >not_listed_location</span
        >
        <h2 class="font-headline-lg text-headline-lg text-text-main">
          Notebook not found
        </h2>
        <p class="font-body-md text-body-md text-text-muted max-w-md">
          This notebook may have been removed or the link is invalid.
        </p>
        <a
          href="/"
          class="bg-primary text-on-primary font-label-md text-label-md px-8 py-3 rounded-lg hover:shadow-lg transition-all"
        >
          Back to Discover
        </a>
      </div>

      <!-- Detail Content (populated by JS) -->
      <div id="detailContent" class="hidden"></div>
    </main>

    <!-- Footer -->
    <footer
      class="w-full py-stack-lg mt-stack-lg bg-surface-container-lowest border-t border-border-subtle"
    >
      <div
        class="flex flex-col md:flex-row justify-between items-center px-gutter max-w-container-max mx-auto gap-6"
      >
        <div class="flex flex-col items-center md:items-start gap-2">
          <span class="font-label-md text-label-md font-bold text-text-main"
            >NotebookLM Community Gallery</span
          >
          <span class="font-body-sm text-body-sm text-text-muted"
            >&copy; 2026 NotebookLM Community Gallery</span
          >
        </div>
        <div class="flex flex-wrap justify-center gap-x-8 gap-y-4">
          <a
            class="font-body-sm text-body-sm text-text-muted hover:text-text-main transition-opacity"
            href="#"
            >Privacy Policy</a
          >
          <a
            class="font-body-sm text-body-sm text-text-muted hover:text-text-main transition-opacity"
            href="#"
            >Terms of Service</a
          >
          <a
            class="font-body-sm text-body-sm text-text-muted hover:text-text-main transition-opacity"
            href="#"
            >Contact Support</a
          >
          <a
            class="font-body-sm text-body-sm text-text-muted hover:text-text-main transition-opacity"
            href="#"
            >About</a
          >
        </div>
      </div>
    </footer>

    <script src="/js/config.js"></script>
    <script src="/js/detail.js"></script>
  </body>
</html>
