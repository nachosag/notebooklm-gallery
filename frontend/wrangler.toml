name = "notebooklm-gallery-dev"
compatibility_date = "2025-01-01"

# Pages config — _worker.js es la entry point
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "notebooklm-marketplace"
database_id = "local-dev"

[[r2_buckets]]
binding = "PREVIEW_IMAGES"
bucket_name = "notebooklm-marketplace-previews"

[[kv_namespaces]]
binding = "SITEMAP_CACHE"
id = "local-dev"

# Service binding to the tested API Worker (deployed from workers/api/ as
# "notebooklm-gallery-api"). env.API.fetch() is used by the thin _worker.js
# proxy for /api/*, /sitemap.xml, /robots.txt. For local dev, run the API
# Worker separately (wrangler dev in workers/api/) or use a remote proxy.
[[services]]
binding = "API"
service = "notebooklm-gallery-api"

# Turnstile se saltea en local (el _worker.js bypassa si no existe la env var)
