  <line x1="23" y1="8" x2="29" y2="8" stroke="#dbe1ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="6" x2="28" y2="10" stroke="#dbe1ff" stroke-width="1" stroke-linecap="round"/>
  <line x1="28" y1="6" x2="24" y2="10" stroke="#dbe1ff" stroke-width="1" stroke-linecap="round"/>
