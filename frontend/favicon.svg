  <rect x="3" y="13" width="7" height="1.5" rx="0.75" fill="#dbe1ff" opacity="0.5"/>
  <rect x="3" y="17" width="8" height="1.5" rx="0.75" fill="#dbe1ff" opacity="0.5"/>
